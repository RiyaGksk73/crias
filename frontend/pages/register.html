<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CRIAS</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>CRIAS</h1>
        <p>Create your account</p>
      </div>

      <div id="alertContainer"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" class="form-input" required 
                 placeholder="Enter your full name" minlength="2">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="form-input" required 
                 placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required 
                 placeholder="Min 8 chars, uppercase, lowercase, number" minlength="8">
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required 
                 placeholder="Confirm your password">
        </div>

        <button type="submit" class="btn btn-primary btn-block" data-original-text="Create Account">
          Create Account
        </button>
      </form>

      <p class="text-center mt-lg text-muted">
        Already have an account? <a href="/pages/login.html">Sign In</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/state.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('crias_token')) {
      window.location.href = '/pages/dashboard.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');

      if (password !== confirmPassword) {
        utils.showAlert('Passwords do not match', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        await api.register(fullName, email, password);
        window.location.href = '/pages/dashboard.html';
      } catch (error) {
        utils.showAlert(error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
