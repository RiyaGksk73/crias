<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CRIAS</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/pages/dashboard.html" class="logo">CRIAS</a>
        <nav class="nav">
          <a href="/pages/dashboard.html" class="active">Dashboard</a>
          <a href="/pages/analyze.html">New Analysis</a>
          <a href="/pages/history.html">History</a>
          <a href="/pages/admin/users.html" class="admin-only">Admin</a>
        </nav>
        <div class="user-menu">
          <span id="userName" class="user-name">Loading...</span>
          <span id="userRole" class="badge">-</span>
          <button class="btn btn-secondary" onclick="auth.logout()">Logout</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="container">
        <div class="page-header flex justify-between items-center">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Manage firms and view risk assessments</p>
          </div>
          <button class="btn btn-primary" onclick="ui.showModal('createFirmModal')">
            + Add Firm
          </button>
        </div>

        <div id="alertContainer"></div>

        <!-- Stats -->
        <div class="stats-grid mb-lg">
          <div class="stat-card">
            <div class="stat-value" id="totalFirms">-</div>
            <div class="stat-label">Total Firms</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="highRiskCount">-</div>
            <div class="stat-label">High/Critical Risk</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="recentPredictions">-</div>
            <div class="stat-label">Predictions This Week</div>
          </div>
        </div>

        <!-- Search -->
        <div class="search-bar">
          <div class="search-input">
            <input type="text" id="searchInput" placeholder="Search firms..." 
                   onkeyup="debouncedSearch()">
          </div>
        </div>

        <!-- Firms Grid -->
        <div id="firmsGrid" class="grid grid-3">
          <div class="loading"><div class="spinner"></div></div>
        </div>

        <!-- Pagination -->
        <div id="pagination"></div>
      </div>
    </main>

    <!-- Create Firm Modal -->
    <div id="createFirmModal" class="modal-overlay" style="display: none;" onclick="ui.hideModal('createFirmModal')">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2 class="modal-title">Add New Firm</h2>
          <button class="modal-close" onclick="ui.hideModal('createFirmModal')">&times;</button>
        </div>
        <form id="createFirmForm">
          <div class="form-group">
            <label class="form-label" for="firmName">Firm Name</label>
            <input type="text" id="firmName" name="firmName" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="firmCode">Firm Code</label>
            <input type="text" id="firmCode" name="firmCode" class="form-input" required 
                   pattern="[A-Za-z0-9]+" placeholder="e.g., ACME01">
          </div>
          <div class="form-group">
            <label class="form-label" for="industry">Industry</label>
            <input type="text" id="industry" name="industry" class="form-input" 
                   placeholder="e.g., Manufacturing">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="ui.hideModal('createFirmModal')">Cancel</button>
            <button type="submit" class="btn btn-primary">Create Firm</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let currentPage = 1;
    const limit = 12;

    const debouncedSearch = utils.debounce(() => {
      currentPage = 1;
      loadFirms();
    }, 300);

    async function loadFirms() {
      const search = document.getElementById('searchInput').value;
      const grid = document.getElementById('firmsGrid');
      
      try {
        const data = await api.getFirms(currentPage, limit, search);
        
        if (data.firms.length === 0) {
          utils.showEmpty(grid, 'No firms found');
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        // Get latest predictions for each firm
        grid.innerHTML = data.firms.map(firm => ui.firmCard(firm)).join('');
        
        // Update stats
        document.getElementById('totalFirms').textContent = data.pagination.total;
        
        // Render pagination
        document.getElementById('pagination').innerHTML = ui.pagination(
          data.pagination.page,
          data.pagination.pages,
          'goToPage'
        );
      } catch (error) {
        utils.showAlert(error.message, 'error');
      }
    }

    function goToPage(page) {
      currentPage = page;
      loadFirms();
    }

    // Create firm form
    document.getElementById('createFirmForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = ui.getFormData('createFirmForm');
      
      try {
        await api.createFirm(formData);
        ui.hideModal('createFirmModal');
        utils.showAlert('Firm created successfully', 'success');
        loadFirms();
        e.target.reset();
      } catch (error) {
        utils.showAlert(error.message, 'error');
      }
    });

    // Initialize
    protectPage().then(authenticated => {
      if (authenticated) {
        loadFirms();
      }
    });
  </script>
</body>
</html>
