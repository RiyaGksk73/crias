<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction History - CRIAS</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/pages/dashboard.html" class="logo">CRIAS</a>
        <nav class="nav">
          <a href="/pages/dashboard.html">Dashboard</a>
          <a href="/pages/analyze.html">New Analysis</a>
          <a href="/pages/history.html" class="active">History</a>
          <a href="/pages/admin/users.html" class="admin-only">Admin</a>
        </nav>
        <div class="user-menu">
          <span id="userName" class="user-name">Loading...</span>
          <span id="userRole" class="badge">-</span>
          <button class="btn btn-secondary" onclick="auth.logout()">Logout</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="container">
        <div class="page-header">
          <h1 class="page-title">Prediction History</h1>
          <p class="page-subtitle">View all past risk assessments</p>
        </div>

        <div id="alertContainer"></div>

        <!-- Filters -->
        <div class="card mb-lg">
          <div class="flex gap-md items-center">
            <div class="form-group" style="margin: 0; flex: 1;">
              <select id="firmFilter" class="form-select" onchange="loadHistory()">
                <option value="">All Firms</option>
              </select>
            </div>
            <div class="form-group" style="margin: 0;">
              <select id="riskFilter" class="form-select" onchange="loadHistory()">
                <option value="">All Risk Levels</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
          </div>
        </div>

        <!-- History Table -->
        <div class="card">
          <div class="admin-table-wrapper">
            <table class="table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Firm</th>
                  <th>PD</th>
                  <th>Risk Level</th>
                  <th>Model</th>
                  <th>Analyst</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="historyTable">
                <tr><td colspan="7" class="text-center">Loading...</td></tr>
              </tbody>
            </table>
          </div>
          <div id="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let currentPage = 1;
    const limit = 20;
    let allPredictions = [];

    async function loadFirms() {
      try {
        const data = await api.getFirms(1, 100);
        const select = document.getElementById('firmFilter');
        
        select.innerHTML = '<option value="">All Firms</option>' + 
          data.firms.map(firm => 
            `<option value="${firm._id}">${firm.firmName} (${firm.firmCode})</option>`
          ).join('');
      } catch (error) {
        console.error('Error loading firms:', error);
      }
    }

    async function loadHistory() {
      const firmId = document.getElementById('firmFilter').value;
      const riskFilter = document.getElementById('riskFilter').value;
      const tbody = document.getElementById('historyTable');
      
      tbody.innerHTML = '<tr><td colspan="7" class="text-center">Loading...</td></tr>';

      try {
        if (firmId) {
          // Load predictions for specific firm
          const data = await api.getPredictionHistory(firmId, currentPage, limit);
          allPredictions = data.predictions;
        } else {
          // Load all firms and aggregate predictions
          const firmsData = await api.getFirms(1, 100);
          allPredictions = [];
          
          for (const firm of firmsData.firms.slice(0, 10)) {
            try {
              const predData = await api.getPredictionHistory(firm._id, 1, 5);
              predData.predictions.forEach(p => {
                p.firmName = firm.firmName;
                p.firmCode = firm.firmCode;
              });
              allPredictions.push(...predData.predictions);
            } catch (e) {
              // Firm may not have predictions
            }
          }
          
          // Sort by date
          allPredictions.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        }

        // Apply risk filter
        let filtered = allPredictions;
        if (riskFilter) {
          filtered = allPredictions.filter(p => p.riskLabel === riskFilter);
        }

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No predictions found</td></tr>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        tbody.innerHTML = filtered.map(prediction => `
          <tr>
            <td>${utils.formatDateTime(prediction.createdAt)}</td>
            <td>${prediction.firmName || '-'} <span class="firm-code">${prediction.firmCode || ''}</span></td>
            <td>
              <span class="pd-value ${prediction.riskLabel}" style="font-size: 16px;">
                ${utils.formatPercent(prediction.pd)}
              </span>
            </td>
            <td>
              <span class="badge badge-${prediction.riskLabel}">${prediction.riskLabel}</span>
            </td>
            <td>${prediction.modelUsed}</td>
            <td>${prediction.createdBy?.fullName || '-'}</td>
            <td>
              <button class="btn btn-secondary" onclick="viewPrediction('${prediction._id}')">
                View
              </button>
            </td>
          </tr>
        `).join('');

      } catch (error) {
        utils.showAlert(error.message, 'error');
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Error loading history</td></tr>';
      }
    }

    function viewPrediction(predictionId) {
      window.location.href = `/pages/results.html?predictionId=${predictionId}`;
    }

    // Initialize
    protectPage().then(authenticated => {
      if (authenticated) {
        loadFirms();
        loadHistory();
      }
    });
  </script>
</body>
</html>
